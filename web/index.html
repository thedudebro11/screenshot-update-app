<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScreenMonitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #09090b;
      --surface:     #111113;
      --surface2:    #18181b;
      --border:      #1c1c1f;
      --border2:     #27272a;
      --accent:      #22c55e;
      --accent-dim:  rgba(34, 197, 94, 0.12);
      --accent-glow: rgba(34, 197, 94, 0.35);
      --text:        #e4e4e7;
      --muted:       #52525b;
      --muted2:      #3f3f46;
      --warn:        #f59e0b;
      --error:       #ef4444;
      --font:        'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
    }

    /* ── HEADER ─────────────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      height: 44px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #logo {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      user-select: none;
    }

    #logo-mark {
      width: 10px;
      height: 10px;
      background: var(--accent);
      flex-shrink: 0;
    }

    .hdiv {
      width: 1px;
      height: 20px;
      background: var(--border2);
    }

    #status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #status-led {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    #status-led.ok       { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
    #status-led.pulsing  { animation: pulse 2.5s ease-in-out infinite; }
    #status-led.fallback { background: var(--warn); }
    #status-led.error    { background: var(--error); }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--accent-glow); }
      50%       { opacity: 0.4; box-shadow: none; }
    }

    #header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #countdown {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.05em;
      min-width: 70px;
      text-align: right;
    }

    #interval-select {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--muted);
      font-family: var(--font);
      font-size: 10px;
      letter-spacing: 0.06em;
      padding: 4px 6px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.12s, color 0.12s;
    }
    #interval-select:hover  { border-color: var(--accent); color: var(--text); }
    #interval-select:focus  { border-color: var(--accent); color: var(--text); }

    button {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 12px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s, color 0.12s;
    }

    button:hover  { border-color: var(--accent); background: var(--accent-dim); }
    button.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    /* ── VIEWPORT ───────────────────────────────────────────────────── */
    #viewport {
      flex: 1;
      position: relative;
      background: #000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    #viewport::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent, transparent 2px,
        rgba(0,0,0,0.045) 2px, rgba(0,0,0,0.045) 4px
      );
      pointer-events: none;
      z-index: 2;
    }

    #screenshot {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
      position: relative;
      z-index: 1;
      transform-origin: 0 0;
      will-change: transform;
      user-select: none;
      -webkit-user-drag: none;
    }

    #zoom-badge {
      position: absolute;
      bottom: 12px;
      right: 12px;
      padding: 3px 9px;
      background: rgba(0,0,0,0.7);
      border: 1px solid var(--border2);
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.08em;
      z-index: 4;
      display: none;
      pointer-events: none;
    }

    #zoom-hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      padding: 3px 10px;
      background: rgba(0,0,0,0.5);
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.06em;
      z-index: 4;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
      white-space: nowrap;
    }

    #zoom-hint.visible { opacity: 1; }

    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      z-index: 1;
    }

    #empty-state .glyph { font-size: 36px; color: var(--muted2); }
    #empty-state .label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }

    #viewport-banner {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      padding: 4px 14px;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      z-index: 3;
      display: none;
      white-space: nowrap;
    }

    #viewport-banner.offline {
      display: block;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid var(--warn);
      color: var(--warn);
    }

    #viewport-banner.history {
      display: block;
      background: rgba(34, 197, 94, 0.07);
      border: 1px solid var(--border2);
      color: var(--muted);
    }

    /* ── META BAR ───────────────────────────────────────────────────── */
    #meta-bar {
      display: flex;
      align-items: center;
      height: 34px;
      padding: 0 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 0;
      overflow: hidden;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-right: 16px;
      margin-right: 16px;
      border-right: 1px solid var(--border);
      white-space: nowrap;
      overflow: hidden;
    }

    .meta-item:last-of-type { border-right: none; }

    .meta-label {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .meta-value { font-size: 11px; overflow: hidden; text-overflow: ellipsis; }
    .mv-ok       { color: var(--accent); }
    .mv-fallback { color: var(--warn); }
    .mv-error    { color: var(--error); }
    .mv-pending  { color: var(--muted); }

    #meta-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #error-msg {
      color: var(--error);
      font-size: 11px;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: none;
    }

    #meta-clock { color: var(--muted); font-size: 10px; }

    /* ── META BAR — MOBILE ──────────────────────────────────────────── */
    @media (max-width: 640px) {
      #meta-bar {
        display: grid;
        grid-template-columns: 1fr 1fr;
        height: auto;
        padding: 0;
        overflow: visible;
      }

      .meta-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 3px;
        padding: 7px 12px;
        margin-right: 0;
        border-right: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        white-space: normal;
        overflow: hidden;
      }

      /* Truncate long target name to one line with ellipsis */
      .meta-item:first-child { overflow: hidden; }
      .meta-item:first-child .meta-value {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        display: block;
      }

      .meta-label { font-size: 9px; }
      .meta-value  { font-size: 12px; }

      /* Right-column cells — no right border */
      .meta-item:nth-child(even) { border-right: none; }

      /* Disk usage spans both columns as a full-width row */
      #disk-item {
        grid-column: 1 / -1;
        flex-direction: row;
        align-items: center;
        border-right: none;
      }

      /* Error + clock row spans full width */
      #meta-right {
        grid-column: 1 / -1;
        margin-left: 0;
        padding: 6px 12px;
        justify-content: space-between;
        border-top: none;
      }

      #error-msg { max-width: none; }
    }

    /* ── TIMELINE ───────────────────────────────────────────────────── */
    #timeline {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      height: 112px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #timeline-label {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      flex-shrink: 0;
      min-width: 100px;
    }

    /* ── Filmstrip ──────────────────────────────────────────────────── */
    #thumbnail-strip {
      flex: 1;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      overflow-y: hidden;
      align-items: center;
      height: 100%;
      padding: 8px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border2) transparent;
    }

    #thumbnail-strip::-webkit-scrollbar        { height: 4px; }
    #thumbnail-strip::-webkit-scrollbar-track  { background: transparent; }
    #thumbnail-strip::-webkit-scrollbar-thumb  { background: var(--border2); border-radius: 2px; }

    #thumbnail-strip .thumb-empty {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .thumb-item {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 3px;
      padding: 2px;
      transition: border-color 0.12s;
    }

    .thumb-item:hover  { border-color: var(--muted2); }
    .thumb-item.active { border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }

    .thumb-item img {
      width: 120px;
      height: 72px;
      object-fit: cover;
      display: block;
      background: var(--border);
      border-radius: 1px;
    }

    .thumb-time {
      color: var(--muted);
      font-size: 9px;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .thumb-item.active .thumb-time { color: var(--accent); }

    #timeline-nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    #btn-prev, #btn-next { padding: 5px 12px; font-size: 16px; line-height: 1; width: 100%; }
    #btn-live { font-size: 10px; padding: 5px 12px; letter-spacing: 0.1em; width: 100%; }

    @media (max-width: 640px) {
      #timeline        { height: 96px; padding: 0 8px; gap: 6px; }
      #timeline-label  { display: none; }
      .thumb-item img  { width: 80px; height: 50px; }
      #btn-prev, #btn-next { padding: 0; min-height: 40px; width: 100%; font-size: 20px; }
      #btn-live        { min-height: 32px; padding: 0; width: 100%; }
    }

    /* ── STORAGE BAR ────────────────────────────────────────────────── */
    #storage-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      height: 36px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #storage-label {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    #btn-limit-dec, #btn-limit-inc {
      padding: 2px 8px;
      font-size: 14px;
      line-height: 1;
      flex-shrink: 0;
    }

    #limit-slider {
      flex: 1;
      min-width: 60px;
      max-width: 280px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--border2);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    #limit-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 2px;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 6px var(--accent-glow);
    }

    #limit-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 2px;
      background: var(--accent);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 6px var(--accent-glow);
    }

    #limit-display {
      color: var(--text);
      font-size: 11px;
      flex-shrink: 0;
      min-width: 80px;
    }

    #limit-saved {
      color: var(--accent);
      font-size: 10px;
      letter-spacing: 0.06em;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #limit-saved.visible { opacity: 1; }

    @media (max-width: 640px) {
      #storage-bar       { flex-wrap: wrap; height: auto; padding: 7px 14px; gap: 8px; }
      #btn-limit-dec,
      #btn-limit-inc     { min-height: 40px; padding: 0 14px; font-size: 16px; }
      #limit-slider      { max-width: none; order: 3; width: 100%; flex-basis: 100%; }
      #limit-display     { min-width: auto; font-size: 12px; }
      #limit-saved       { order: 4; }
    }

    /* ── HEADER + GLOBAL — MOBILE ──────────────────────────────────── */
    @media (max-width: 640px) {
      body { font-size: 13px; }

      #header {
        flex-wrap: wrap;
        height: auto;
        padding: 0 16px;
        gap: 0;
      }

      #logo { padding: 9px 0; }
      .hdiv { display: none; }

      #status-pill {
        margin-left: auto;
        padding: 4px 10px;
        font-size: 11px;
      }

      #header-right {
        width: 100%;
        margin-left: 0;
        padding: 8px 0 10px;
        border-top: 1px solid var(--border);
        gap: 8px;
      }

      #header-right button,
      #interval-select {
        flex: 1;
        min-height: 44px;
        font-size: 12px;
        padding: 0 10px;
      }
    }

    /* ── HELP BAR ───────────────────────────────────────────────────── */
    #help-bar {
      height: 26px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      overflow: hidden;
    }

    #help-bar-icon {
      color: var(--accent);
      font-size: 10px;
      letter-spacing: 0.1em;
      flex-shrink: 0;
      opacity: 0.6;
    }

    #help-bar-text {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.15s;
    }

    #help-bar.active #help-bar-text { color: var(--text); }

    @media (max-width: 640px) {
      #help-bar { display: none; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="logo">
    <div id="logo-mark"></div>
    ScreenMonitor
  </div>
  <div class="hdiv"></div>
  <div id="status-pill" data-help="Current capture status — OK means screenshots are being taken successfully">
    <div id="status-led"></div>
    <span id="status-text">CONNECTING</span>
  </div>
  <div id="header-right">
    <select id="interval-select" data-help="How often ScreenMonitor takes a screenshot — lower interval means more frequent updates but uses more disk space">
      <option value="0.5">📸 30s</option>
      <option value="1"  >📸 1m</option>
      <option value="2"  >📸 2m</option>
      <option value="5"  >📸 5m</option>
      <option value="10" >📸 10m</option>
      <option value="30" >📸 30m</option>
    </select>
    <button id="btn-download" data-help="Download the screenshot you're currently viewing and save it as a file on your computer">↓ Save</button>
    <button id="btn-refresh" data-help="Manually check for new screenshots right now instead of waiting for the next automatic update">Refresh</button>
  </div>
</div>

<!-- VIEWPORT -->
<div id="viewport">
  <div id="viewport-banner"></div>
  <div id="empty-state">
    <div class="glyph">◉</div>
    <div class="label">Waiting for first capture…</div>
  </div>
  <img id="screenshot" alt="screenshot" data-help="Scroll to zoom in · Click and drag to pan around · Double-click to reset zoom back to normal">
  <div id="zoom-badge">100%</div>
  <div id="zoom-hint">pinch to zoom · drag to pan · double-tap to reset</div>
</div>

<!-- META BAR -->
<div id="meta-bar">
  <div class="meta-item" data-help="The window or screen currently being monitored — change it from the system tray">
    <span class="meta-label">Target</span>
    <span class="meta-value" id="meta-target">—</span>
  </div>
  <div class="meta-item" data-help="OK = capturing normally · Fallback = target window not found, showing full screen · Error = something went wrong">
    <span class="meta-label">Status</span>
    <span class="meta-value" id="meta-status">—</span>
  </div>
  <div class="meta-item" data-help="How long ago the last screenshot was taken">
    <span class="meta-label">Captured</span>
    <span class="meta-value" id="meta-captured">—</span>
  </div>
  <div class="meta-item" data-help="Total number of screenshots saved to disk — oldest ones are deleted automatically once the limit is reached">
    <span class="meta-label">Saved</span>
    <span class="meta-value" id="meta-count">—</span>
  </div>
  <div class="meta-item" id="disk-item" style="display:none" data-help="Total disk space used by all saved screenshots — change the screenshot folder from the system tray">
    <span class="meta-label">Disk</span>
    <span class="meta-value" id="meta-disk">—</span>
  </div>
  <div id="meta-right">
    <span id="error-msg"></span>
    <span id="meta-clock"></span>
  </div>
</div>

<!-- TIMELINE -->
<div id="timeline">
  <span id="timeline-label">HISTORY ─ 0 FRAMES</span>
  <div id="thumbnail-strip"></div>
  <div id="timeline-nav">
    <button id="btn-prev" data-help="Go back to the previous (older) screenshot — keyboard shortcut: ← arrow key">‹</button>
    <button id="btn-next" data-help="Go forward to the next (newer) screenshot — keyboard shortcut: → arrow key">›</button>
    <button id="btn-live" class="active" data-help="Jump to the latest screenshot and resume live updates — new screenshots will appear automatically as they are taken">LIVE</button>
  </div>
</div>

<!-- STORAGE -->
<div id="storage-bar">
  <span id="storage-label">Keep Last</span>
  <button id="btn-limit-dec" data-help="Store fewer screenshots — reduces disk usage">−</button>
  <input type="range" id="limit-slider" min="10" max="500" step="10" value="100"
    data-help="Drag to set how many screenshots to keep — oldest are deleted automatically once the limit is reached">
  <button id="btn-limit-inc" data-help="Store more screenshots — keeps longer history">+</button>
  <span id="limit-display">100 frames</span>
  <span id="limit-saved">✓ saved</span>
</div>

<!-- HELP BAR -->
<div id="help-bar">
  <span id="help-bar-icon">?</span>
  <span id="help-bar-text">Hover over any button or control to see what it does</span>
</div>

<script>
  const TOKEN = new URLSearchParams(location.search).get('token') || '';

  // ── State ──────────────────────────────────────────────────────────
  let screenshots = [];   // [{ t, iso }, ...] newest first
  let currentT    = null;
  let isLive      = true;
  let isOnline    = true;
  let lastStatus  = null;
  let countdownN  = 30;
  let tickId      = null;

  const LS_STATUS = 'sm_last_status';

  // ── Helpers ────────────────────────────────────────────────────────
  const api = (p) => p + (p.includes('?') ? '&' : '?') + `token=${TOKEN}`;

  function relTime(iso) {
    if (!iso) return '—';
    const s = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (s < 5)      return 'just now';
    if (s < 60)     return `${s}s ago`;
    if (s < 3600)   return `${Math.floor(s / 60)}m ago`;
    if (s < 86400)  return `${Math.floor(s / 3600)}h ago`;
    if (s < 604800) return `${Math.floor(s / 86400)}d ago`;
    return `${Math.floor(s / 604800)}w ago`;
  }

  function fmtTs(t) {
    return t ? new Date(t).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' }) : '—';
  }

  // ── Status ─────────────────────────────────────────────────────────
  async function fetchStatus() {
    try {
      const res = await fetch(api('/status'));
      if (res.status === 401) { showBanner('offline', 'AUTH FAILED — check token in URL'); return; }
      const s = await res.json();
      lastStatus = s;
      try { localStorage.setItem(LS_STATUS, JSON.stringify(s)); } catch(_) {}
      isOnline = true;
      renderStatus(s, false);
    } catch(_) {
      isOnline = false;
      let cached = null;
      try { cached = JSON.parse(localStorage.getItem(LS_STATUS)); } catch(_) {}
      renderStatus(cached, true);
    }
  }

  function renderStatus(s, offline) {
    const led = document.getElementById('status-led');
    const txt = document.getElementById('status-text');

    if (!s) {
      led.className = '';
      txt.textContent = 'OFFLINE';
      showBanner('offline', '⚠  OFFLINE — CANNOT REACH SERVER');
      return;
    }

    const code = offline ? 'offline' : (s.status || 'pending');
    const labels = { ok:'LIVE', fallback:'FALLBACK', error:'ERROR', pending:'PENDING', offline:'OFFLINE' };

    led.className = (code === 'ok' ? 'ok' : code === 'fallback' ? 'fallback' : code === 'error' ? 'error' : '');
    if (code === 'ok' && isLive) led.classList.add('pulsing');
    txt.textContent = labels[code] || code.toUpperCase();

    document.getElementById('meta-target').textContent   = s.targetWindow || '—';
    const ms = document.getElementById('meta-status');
    ms.textContent  = code.toUpperCase();
    ms.className    = `meta-value mv-${code}`;
    document.getElementById('meta-captured').textContent = relTime(s.lastCaptureTime);
    document.getElementById('meta-count').textContent    = s.screenshotCount != null ? `${s.screenshotCount}` : '—';
    document.getElementById('meta-clock').textContent    = s.serverTime ? new Date(s.serverTime).toLocaleTimeString() : '';

    // Sync interval selector to current server-side capture interval
    if (s.captureIntervalMs != null) {
      const sel     = document.getElementById('interval-select');
      const minutes = s.captureIntervalMs / 60000;
      // Pick the closest option
      let best = null, bestDiff = Infinity;
      for (const opt of sel.options) {
        const diff = Math.abs(parseFloat(opt.value) - minutes);
        if (diff < bestDiff) { bestDiff = diff; best = opt; }
      }
      if (best && bestDiff < 0.1) sel.value = best.value;
    }

    // Sync history limit slider
    if (s.historyLimit != null) {
      const slider = document.getElementById('limit-slider');
      if (slider && !slider.matches(':active')) {
        slider.value = s.historyLimit;
        updateLimitDisplay(s.historyLimit, s.screenshotCount);
      }
    }

    // Disk usage — warn at 300 MB, error at 500 MB
    if (s.screenshotSizeKb != null) {
      const mb    = s.screenshotSizeKb / 1024;
      const diskEl = document.getElementById('meta-disk');
      const diskItem = document.getElementById('disk-item');
      diskEl.textContent = mb < 1000 ? `${mb.toFixed(0)} MB` : `${(mb / 1024).toFixed(1)} GB`;
      diskEl.className   = 'meta-value' + (mb > 500 ? ' mv-error' : mb > 300 ? ' mv-fallback' : '');
      diskItem.style.display = '';
    }

    const errEl = document.getElementById('error-msg');
    if (s.error) { errEl.textContent = s.error; errEl.style.display = 'block'; }
    else          { errEl.style.display = 'none'; }

    if (offline) {
      showBanner('offline', '⚠  OFFLINE — SHOWING LAST KNOWN STATE');
    } else if (!isLive) {
      showBanner('history', `◈  HISTORY  ${fmtTs(currentT)}`);
    } else {
      hideBanner();
    }
  }

  function showBanner(cls, text) {
    const b = document.getElementById('viewport-banner');
    b.className   = cls;
    b.textContent = text;
  }

  function hideBanner() {
    const b = document.getElementById('viewport-banner');
    b.className   = '';
    b.textContent = '';
  }

  // ── Timeline ───────────────────────────────────────────────────────
  async function fetchTimeline() {
    try {
      const res  = await fetch(api('/screenshots'));
      const data = await res.json();
      screenshots = data.files || [];
      renderTimeline();
    } catch(_) {}
  }

  function renderTimeline() {
    const strip = document.getElementById('thumbnail-strip');
    const label = document.getElementById('timeline-label');
    label.textContent = `HISTORY ─ ${screenshots.length} FRAMES`;

    if (!screenshots.length) {
      strip.innerHTML = '<span class="thumb-empty">No captures yet</span>';
      return;
    }

    // Render all screenshots oldest → newest (strip scrolls horizontally)
    const items = [...screenshots].reverse();
    strip.innerHTML = '';
    items.forEach(({ t, iso }) => {
      const time = new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const item       = document.createElement('div');
      item.className   = 'thumb-item' + (t === currentT ? ' active' : '');
      item.dataset.t   = t;
      item.dataset.help = `Screenshot from ${new Date(iso).toLocaleString()} — click to view`;
      item.onclick      = () => selectShot(t);

      const img   = document.createElement('img');
      img.src     = api(`/thumbnail?t=${t}`);
      img.loading = 'lazy';
      img.alt     = '';

      const ts        = document.createElement('div');
      ts.className    = 'thumb-time';
      ts.textContent  = time;

      item.appendChild(img);
      item.appendChild(ts);
      strip.appendChild(item);
    });

    scrollActiveThumbIntoView();
  }

  function syncThumbs() {
    document.querySelectorAll('#thumbnail-strip .thumb-item').forEach(el => {
      const active = Number(el.dataset.t) === currentT;
      el.classList.toggle('active', active);
      const ts = el.querySelector('.thumb-time');
      if (ts) ts.style.color = active ? 'var(--accent)' : '';
    });
    scrollActiveThumbIntoView();
  }

  function scrollActiveThumbIntoView() {
    const active = document.querySelector('#thumbnail-strip .thumb-item.active');
    if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'nearest', block: 'nearest' });
  }

  // ── Screenshot load ────────────────────────────────────────────────
  function loadShot(t) {
    const url   = t ? api(`/screenshot?t=${t}`) : api(`/screenshot?_=${Date.now()}`);
    const probe = new Image();
    probe.onload = () => {
      img.src                = probe.src;
      img.style.display      = 'block';
      document.getElementById('empty-state').style.display = 'none';
    };
    probe.onerror = () => { isOnline = false; };
    probe.src = url;
  }

  function selectShot(t) {
    currentT = t;
    isLive   = false;
    document.getElementById('btn-live').classList.remove('active');
    syncThumbs();
    loadShot(t);
    showBanner('history', `◈  HISTORY  ${fmtTs(t)}`);
    // Timer keeps running so the timeline stays fresh while browsing history.
    // updateCountdown() is a no-op when isLive is false, so display is unaffected.
  }

  function goLive() {
    isLive   = true;
    document.getElementById('btn-live').classList.add('active');
    fetchTimeline().then(() => {
      currentT = screenshots[0]?.t || null;
      syncThumbs();
      loadShot(null);
    });
    renderStatus(lastStatus, !isOnline);
    hideBanner();
  }

  // ── Navigate prev / next ───────────────────────────────────────────
  function navigate(delta) {
    if (!screenshots.length) return;
    const idx  = screenshots.findIndex(s => s.t === currentT);
    const next = (idx === -1 ? 0 : idx + delta);
    if (next < 0 || next >= screenshots.length) return;
    selectShot(screenshots[next].t);
  }

  // ── Auto-refresh tick ──────────────────────────────────────────────
  async function doRefresh() {
    await fetchStatus();
    await fetchTimeline();
    if (isLive) {
      currentT = screenshots[0]?.t || null;
      loadShot(null);
      syncThumbs();
    }
  }

  function startTick() {
    clearInterval(tickId);
    countdownN = 30;
    updateCountdown();
    tickId = setInterval(() => {
      countdownN--;
      updateCountdown();
      if (countdownN <= 0) { countdownN = 30; doRefresh(); }
    }, 1000);
  }

  function updateCountdown() { /* timer runs silently — no display */ }

  // ── Events ─────────────────────────────────────────────────────────
  document.getElementById('btn-refresh').addEventListener('click', () => {
    doRefresh();
  });

  document.getElementById('interval-select').addEventListener('change', async (e) => {
    const minutes = parseFloat(e.target.value);
    try {
      await fetch(api(`/config/interval?minutes=${minutes}`));
    } catch(_) {}
  });

  document.getElementById('btn-download').addEventListener('click', () => {
    const t        = currentT;
    const url      = t ? api(`/screenshot?t=${t}`) : api(`/screenshot?_=${Date.now()}`);
    const filename = `screenmonitor-${t || Date.now()}.png`;
    const a        = document.createElement('a');
    a.href         = url;
    a.download     = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });

  document.getElementById('btn-live').addEventListener('click', () => goLive());
  document.getElementById('btn-prev').addEventListener('click', () => navigate(1));
  document.getElementById('btn-next').addEventListener('click', () => navigate(-1));

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft')       navigate(1);
    if (e.key === 'ArrowRight')      navigate(-1);
    if (e.key === 'l' || e.key === 'L') goLive();

  });

  // ── Zoom & pan ─────────────────────────────────────────────────────
  const vp         = document.getElementById('viewport');
  const img        = document.getElementById('screenshot');
  const zoomBadge  = document.getElementById('zoom-badge');
  const zoomHint   = document.getElementById('zoom-hint');

  let z = { scale: 1, dx: 0, dy: 0 };
  let dragging = false, dragX = 0, dragY = 0;
  let hintTimer = null;

  function applyZoom() {
    img.style.transform = `translate(${z.dx}px, ${z.dy}px) scale(${z.scale})`;
    const pct = Math.round(z.scale * 100);
    if (z.scale > 1.01) {
      zoomBadge.textContent  = `${pct}%`;
      zoomBadge.style.display = 'block';
      vp.style.cursor = dragging ? 'grabbing' : 'grab';
    } else {
      zoomBadge.style.display = 'none';
      vp.style.cursor = 'default';
    }
  }

  function resetZoom() {
    z = { scale: 1, dx: 0, dy: 0 };
    applyZoom();
  }

  function showHint() {
    zoomHint.classList.add('visible');
    clearTimeout(hintTimer);
    hintTimer = setTimeout(() => zoomHint.classList.remove('visible'), 2000);
  }

  // Scroll to zoom, centered on cursor
  vp.addEventListener('wheel', (e) => {
    e.preventDefault();
    if (img.style.display === 'none') return;

    const rect     = vp.getBoundingClientRect();
    const cx       = e.clientX - rect.left;
    const cy       = e.clientY - rect.top;
    const factor   = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    const newScale = Math.min(Math.max(z.scale * factor, 1), 12);

    if (newScale === 1) { resetZoom(); return; }

    z.dx    = cx - (cx - z.dx) * newScale / z.scale;
    z.dy    = cy - (cy - z.dy) * newScale / z.scale;
    z.scale = newScale;
    applyZoom();
    if (newScale > 1.05) showHint();
  }, { passive: false });

  // Drag to pan
  vp.addEventListener('mousedown', (e) => {
    if (z.scale <= 1 || e.button !== 0) return;
    dragging = true;
    dragX    = e.clientX;
    dragY    = e.clientY;
    vp.style.cursor = 'grabbing';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    z.dx += e.clientX - dragX;
    z.dy += e.clientY - dragY;
    dragX = e.clientX;
    dragY = e.clientY;
    applyZoom();
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    applyZoom();
  });

  // Double-click to reset
  vp.addEventListener('dblclick', resetZoom);

  // Touch pinch-to-zoom + single-finger pan
  let lastTouchDist = null;
  let touchPanActive = false, touchPanX = 0, touchPanY = 0;

  vp.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      touchPanActive = false;
      lastTouchDist  = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    } else if (e.touches.length === 1 && z.scale > 1) {
      touchPanActive = true;
      touchPanX      = e.touches[0].clientX;
      touchPanY      = e.touches[0].clientY;
    }
  }, { passive: true });

  vp.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2 && lastTouchDist !== null) {
      // Pinch-to-zoom
      e.preventDefault();
      touchPanActive = false;
      const dist     = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      const factor   = dist / lastTouchDist;
      const rect     = vp.getBoundingClientRect();
      const cx       = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
      const cy       = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
      const newScale = Math.min(Math.max(z.scale * factor, 1), 12);
      z.dx           = cx - (cx - z.dx) * newScale / z.scale;
      z.dy           = cy - (cy - z.dy) * newScale / z.scale;
      z.scale        = newScale;
      lastTouchDist  = dist;
      applyZoom();
    } else if (e.touches.length === 1 && touchPanActive) {
      // Single-finger pan (only when zoomed in)
      e.preventDefault();
      z.dx      += e.touches[0].clientX - touchPanX;
      z.dy      += e.touches[0].clientY - touchPanY;
      touchPanX  = e.touches[0].clientX;
      touchPanY  = e.touches[0].clientY;
      applyZoom();
    }
  }, { passive: false });

  vp.addEventListener('touchend', () => {
    lastTouchDist  = null;
    touchPanActive = false;
  });

  // ── SSE — instant update when a new screenshot is saved ────────────
  (function connectSSE() {
    const src = new EventSource(api('/events'));
    src.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        if (data.type === 'screenshot') {
          fetchTimeline().then(() => {
            if (isLive) {
              currentT = screenshots[0]?.t || null;
              loadShot(null);
              syncThumbs();
            } else {
              // New dot appears in timeline even while browsing history
              renderTimeline();
            }
          });
          fetchStatus();
        }
      } catch(_) {}
    };
    // onerror is fine to ignore — EventSource auto-reconnects,
    // and the 30s poll loop is the fallback.
  })();

  // ── Live relative-time ticker ──────────────────────────────────────
  // Re-renders "Captured: Xs ago" every second from the cached timestamp.
  // No network call — purely client-side recompute.
  setInterval(() => {
    if (lastStatus?.lastCaptureTime) {
      document.getElementById('meta-captured').textContent = relTime(lastStatus.lastCaptureTime);
    }
  }, 1000);

  // ── Storage / history limit ────────────────────────────────────────
  const limitSlider  = document.getElementById('limit-slider');
  const limitDisplay = document.getElementById('limit-display');
  const limitSaved   = document.getElementById('limit-saved');
  let limitSaveTimer = null;
  let limitSavedFadeTimer = null;

  function updateLimitDisplay(limit, count) {
    const used = count != null ? `${count} / ` : '';
    limitDisplay.textContent = `${used}${limit} frames`;
  }

  async function saveLimit(limit) {
    try {
      await fetch(api(`/config/history-limit?limit=${limit}`));
      limitSaved.classList.add('visible');
      clearTimeout(limitSavedFadeTimer);
      limitSavedFadeTimer = setTimeout(() => limitSaved.classList.remove('visible'), 2000);
    } catch(_) {}
  }

  limitSlider.addEventListener('input', () => {
    const v = parseInt(limitSlider.value, 10);
    updateLimitDisplay(v, lastStatus?.screenshotCount);
    clearTimeout(limitSaveTimer);
    limitSaveTimer = setTimeout(() => saveLimit(v), 500);
  });

  document.getElementById('btn-limit-dec').addEventListener('click', () => {
    const v = Math.max(10, parseInt(limitSlider.value, 10) - 10);
    limitSlider.value = v;
    updateLimitDisplay(v, lastStatus?.screenshotCount);
    clearTimeout(limitSaveTimer);
    limitSaveTimer = setTimeout(() => saveLimit(v), 500);
  });

  document.getElementById('btn-limit-inc').addEventListener('click', () => {
    const v = Math.min(500, parseInt(limitSlider.value, 10) + 10);
    limitSlider.value = v;
    updateLimitDisplay(v, lastStatus?.screenshotCount);
    clearTimeout(limitSaveTimer);
    limitSaveTimer = setTimeout(() => saveLimit(v), 500);
  });

  // ── Help bar ───────────────────────────────────────────────────────
  const helpBar     = document.getElementById('help-bar');
  const helpBarText = document.getElementById('help-bar-text');
  const helpDefault = 'Hover over any button or control to see what it does';

  document.addEventListener('mouseover', (e) => {
    const el = e.target.closest('[data-help]');
    if (el) {
      helpBarText.textContent = el.dataset.help;
      helpBar.classList.add('active');
    } else {
      helpBarText.textContent = helpDefault;
      helpBar.classList.remove('active');
    }
  });

  // ── Boot ───────────────────────────────────────────────────────────
  doRefresh().then(() => {
    if (isLive && screenshots.length) {
      currentT = screenshots[0].t;
      loadShot(null);
      syncThumbs();
    }
    startTick();
  });
</script>
</body>
</html>
